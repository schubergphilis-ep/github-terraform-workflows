name: Provider Release

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use. If empty, reads from go.mod.'
        required: false
        type: string
        default: ''
      config-file:
        description: 'Path to release-please config file'
        required: false
        type: string
        default: '.github/release-please-config.json'
      manifest-file:
        description: 'Path to release-please manifest file'
        required: false
        type: string
        default: '.github/.release-please-manifest.json'
    secrets:
      token:
        description: 'A PAT is recommended so that tags created by release-please can trigger the goreleaser job. Falls back to GITHUB_TOKEN.'
        required: false
      gpg_private_key:
        description: 'GPG private key (ASCII-armored) for signing release checksums'
        required: true
      gpg_passphrase:
        description: 'Passphrase for the GPG private key'
        required: true

jobs:
  release-please:
    if: startsWith(github.ref, 'refs/heads/')
    uses: schubergphilis-ep/github-terraform-workflows/.github/workflows/release-please.yaml@main
    with:
      config-file: ${{ inputs.config-file }}
      manifest-file: ${{ inputs.manifest-file }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    secrets:
      token: ${{ secrets.token }}

  goreleaser:
    name: GoReleaser
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff #v5.6.0
        with:
          go-version: ${{ inputs.go-version || null }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec #v6.3.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.gpg_private_key }}
          passphrase: ${{ secrets.gpg_passphrase }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a #v6.4.0
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.token || secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
