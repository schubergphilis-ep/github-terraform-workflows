name: Provider CI

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use. If empty, reads from go.mod.'
        required: false
        type: string
        default: ''
      golangci-lint-version:
        description: 'golangci-lint version to use'
        required: false
        type: string
        default: 'latest'

jobs:
  validate:
    name: Validate provider structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Check repository naming convention
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ ! "$REPO_NAME" =~ ^terraform-provider- ]]; then
            echo "::error::Repository name '$REPO_NAME' does not follow the required 'terraform-provider-{NAME}' naming convention."
            exit 1
          fi

      - name: Check terraform-registry-manifest.json exists
        run: |
          if [ ! -f terraform-registry-manifest.json ]; then
            echo "::error::terraform-registry-manifest.json is missing. This file is required for Terraform Registry publishing."
            exit 1
          fi

      - name: Validate terraform-registry-manifest.json
        run: |
          if ! jq empty terraform-registry-manifest.json 2>/dev/null; then
            echo "::error::terraform-registry-manifest.json is not valid JSON."
            exit 1
          fi
          # Check required fields
          PROTOCOL_VERSIONS=$(jq -r '.metadata.protocol_versions // empty' terraform-registry-manifest.json)
          if [ -z "$PROTOCOL_VERSIONS" ]; then
            echo "::error::terraform-registry-manifest.json must contain metadata.protocol_versions."
            exit 1
          fi

      - name: Validate GoReleaser release mode is append
        run: |
          if [ ! -f .goreleaser.yml ] && [ ! -f .goreleaser.yaml ]; then
            echo "::error::.goreleaser.yml is missing. This file is required for provider releases."
            exit 1
          fi
          GORELEASER_FILE=$(ls .goreleaser.yml .goreleaser.yaml 2>/dev/null | head -1)
          MODE=$(yq -r '.release.mode' "$GORELEASER_FILE")
          if [ "$MODE" != "append" ]; then
            echo "::error::GoReleaser release.mode must be set to 'append' to coexist with release-please. Found: '${MODE:-<not set>}'."
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e #v7.0.0
        with:
          go-version: ${{ inputs.go-version || null }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e #v7.0.0
        with:
          go-version: ${{ inputs.go-version || null }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}

      - name: Test
        run: go test ./...

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e #v7.0.0
        with:
          go-version: ${{ inputs.go-version || null }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}

      - name: Vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e #v7.0.0
        with:
          go-version: ${{ inputs.go-version || null }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa #v7.0.1
        with:
          version: ${{ inputs.golangci-lint-version }}

  goreleaser-check:
    name: GoReleaser check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e #v7.0.0
        with:
          go-version: ${{ inputs.go-version || null }}
          go-version-file: ${{ inputs.go-version == '' && 'go.mod' || '' }}

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 #v7.2.3
        with:
          args: check
