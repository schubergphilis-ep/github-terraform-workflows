# Example caller workflow for Terraform provider CI.
# Place this in your provider repository at .github/workflows/ci.yaml

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  Commit:
    uses: schubergphilis-ep/github-terraform-workflows/.github/workflows/commit.yaml@main
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit

  Provider:
    uses: schubergphilis-ep/github-terraform-workflows/.github/workflows/provider-ci.yaml@main
    permissions:
      contents: read
    secrets: inherit
